<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 384" width="384" height="384" shape-rendering="crispEdges">

  <!-- Deep space background -->
  <rect width="384" height="384" fill="#0a0a1f"/>

  <!-- Outer glow border -->
  <rect x="2" y="2" width="380" height="380" fill="none" stroke="#3a4aaa" stroke-width="2" opacity="0.5"/>
  <rect x="6" y="6" width="372" height="372" fill="none" stroke="#5566cc" stroke-width="1" opacity="0.25"/>

  <!-- Stars (decorative) -->
  <rect x="20" y="18" width="3" height="3" fill="#aabbff" opacity="0.7"/>
  <rect x="348" y="30" width="3" height="3" fill="#aabbff" opacity="0.6"/>
  <rect x="36" y="320" width="3" height="3" fill="#8899dd" opacity="0.5"/>
  <rect x="340" y="310" width="3" height="3" fill="#aabbff" opacity="0.7"/>
  <rect x="14" y="200" width="2" height="2" fill="#8899dd" opacity="0.5"/>
  <rect x="360" y="180" width="2" height="2" fill="#aabbff" opacity="0.6"/>
  <rect x="356" y="340" width="3" height="3" fill="#8899dd" opacity="0.5"/>
  <rect x="22" y="350" width="2" height="2" fill="#aabbff" opacity="0.6"/>

  <!-- ============================================ -->
  <!-- PIXEL ART CHARACTER  (16×16 grid, 24px each) -->
  <!-- Grid origin: x=0, y=0 (full 384×384 canvas)  -->
  <!-- ============================================ -->

  <!-- ROW 1  (y=24)  — top of hair: cols 3-12 -->
  <rect x="72"  y="24"  width="240" height="24" fill="#1c0e03"/>

  <!-- ROW 2  (y=48)  — hair wider: cols 2-13 -->
  <rect x="48"  y="48"  width="288" height="24" fill="#1c0e03"/>

  <!-- ROW 3  (y=72)  — hair + skin -->
  <rect x="24"  y="72"  width="72"  height="24" fill="#1c0e03"/>  <!-- cols 1-3  hair  -->
  <rect x="96"  y="72"  width="192" height="24" fill="#e8b896"/>  <!-- cols 4-11 skin  -->
  <rect x="288" y="72"  width="72"  height="24" fill="#1c0e03"/>  <!-- cols 12-14 hair -->

  <!-- ROW 4  (y=96)  — eyebrows -->
  <rect x="24"  y="96"  width="24"  height="24" fill="#1c0e03"/>  <!-- col 1  hair        -->
  <rect x="48"  y="96"  width="24"  height="24" fill="#e8b896"/>  <!-- col 2  skin        -->
  <rect x="72"  y="96"  width="72"  height="24" fill="#1c0e03"/>  <!-- cols 3-5 L-brow    -->
  <rect x="144" y="96"  width="48"  height="24" fill="#e8b896"/>  <!-- cols 6-7 skin      -->
  <rect x="192" y="96"  width="72"  height="24" fill="#1c0e03"/>  <!-- cols 8-10 R-brow   -->
  <rect x="264" y="96"  width="48"  height="24" fill="#e8b896"/>  <!-- cols 11-12 skin    -->
  <rect x="312" y="96"  width="24"  height="24" fill="#1c0e03"/>  <!-- col 13 skin        -->
  <rect x="336" y="96"  width="24"  height="24" fill="#1c0e03"/>  <!-- col 14 hair        -->

  <!-- ROW 5  (y=120) — eyes -->
  <rect x="24"  y="120" width="24"  height="24" fill="#1c0e03"/>  <!-- col 1  hair        -->
  <rect x="48"  y="120" width="48"  height="24" fill="#e8b896"/>  <!-- cols 2-3 skin      -->
  <rect x="96"  y="120" width="48"  height="24" fill="#111133"/>  <!-- cols 4-5 L eye     -->
  <rect x="120" y="120" width="6"   height="6"  fill="#aaaaee"/>  <!-- L eye glint        -->
  <rect x="144" y="120" width="96"  height="24" fill="#e8b896"/>  <!-- cols 6-9 skin      -->
  <rect x="240" y="120" width="48"  height="24" fill="#111133"/>  <!-- cols 10-11 R eye   -->
  <rect x="264" y="120" width="6"   height="6"  fill="#aaaaee"/>  <!-- R eye glint        -->
  <rect x="288" y="120" width="48"  height="24" fill="#e8b896"/>  <!-- cols 12-13 skin    -->
  <rect x="336" y="120" width="24"  height="24" fill="#1c0e03"/>  <!-- col 14 hair        -->

  <!-- ROW 6  (y=144) — nose area -->
  <rect x="24"  y="144" width="24"  height="24" fill="#1c0e03"/>  <!-- col 1  hair        -->
  <rect x="48"  y="144" width="120" height="24" fill="#e8b896"/>  <!-- cols 2-6 skin      -->
  <rect x="168" y="144" width="24"  height="24" fill="#c4906a"/>  <!-- col 7 nose shadow  -->
  <rect x="192" y="144" width="144" height="24" fill="#e8b896"/>  <!-- cols 8-13 skin     -->
  <rect x="336" y="144" width="24"  height="24" fill="#1c0e03"/>  <!-- col 14 hair        -->

  <!-- ROW 7  (y=168) — mouth -->
  <rect x="24"  y="168" width="24"  height="24" fill="#1c0e03"/>  <!-- col 1  hair        -->
  <rect x="48"  y="168" width="72"  height="24" fill="#e8b896"/>  <!-- cols 2-4 skin      -->
  <rect x="120" y="168" width="144" height="24" fill="#d05555"/>  <!-- cols 5-10 mouth    -->
  <rect x="264" y="168" width="72"  height="24" fill="#e8b896"/>  <!-- cols 11-13 skin    -->
  <rect x="336" y="168" width="24"  height="24" fill="#1c0e03"/>  <!-- col 14 hair        -->

  <!-- ROW 8  (y=192) — chin / lower face -->
  <rect x="24"  y="192" width="24"  height="24" fill="#1c0e03"/>  <!-- col 1  hair        -->
  <rect x="48"  y="192" width="288" height="24" fill="#e8b896"/>  <!-- cols 2-13 skin     -->
  <rect x="336" y="192" width="24"  height="24" fill="#1c0e03"/>  <!-- col 14 hair        -->

  <!-- ROW 9  (y=216) — jaw -->
  <rect x="48"  y="216" width="24"  height="24" fill="#1c0e03"/>  <!-- col 2  hair        -->
  <rect x="72"  y="216" width="240" height="24" fill="#e8b896"/>  <!-- cols 3-12 skin     -->
  <rect x="312" y="216" width="24"  height="24" fill="#1c0e03"/>  <!-- col 13 hair        -->

  <!-- ROW 10 (y=240) — chin taper -->
  <rect x="72"  y="240" width="48"  height="24" fill="#1c0e03"/>  <!-- cols 3-4 hair      -->
  <rect x="120" y="240" width="144" height="24" fill="#e8b896"/>  <!-- cols 5-10 skin     -->
  <rect x="264" y="240" width="48"  height="24" fill="#1c0e03"/>  <!-- cols 11-12 hair    -->

  <!-- ROW 11 (y=264) — neck / shirt collar -->
  <rect x="96"  y="264" width="24"  height="24" fill="#1e3a6e"/>  <!-- col 4  shirt       -->
  <rect x="120" y="264" width="24"  height="24" fill="#eeeeff"/>  <!-- col 5  collar      -->
  <rect x="144" y="264" width="96"  height="24" fill="#e8b896"/>  <!-- cols 6-9 neck skin -->
  <rect x="240" y="264" width="24"  height="24" fill="#eeeeff"/>  <!-- col 10 collar      -->
  <rect x="264" y="264" width="24"  height="24" fill="#1e3a6e"/>  <!-- col 11 shirt       -->

  <!-- ROW 12 (y=288) — upper shirt -->
  <rect x="72"  y="288" width="240" height="24" fill="#1e3a6e"/>

  <!-- ROW 13 (y=312) — shirt -->
  <rect x="48"  y="312" width="288" height="24" fill="#1e3a6e"/>

  <!-- ROW 14 (y=336) — shirt wide -->
  <rect x="24"  y="336" width="336" height="24" fill="#1e3a6e"/>

  <!-- ROW 15 (y=360) — shirt full width -->
  <rect x="0"   y="360" width="384" height="24" fill="#1e3a6e"/>

  <!-- Shirt highlight stripe (left shoulder) -->
  <rect x="96"  y="288" width="24"  height="24" fill="#2a4e8e" opacity="0.7"/>
  <rect x="72"  y="312" width="24"  height="24" fill="#2a4e8e" opacity="0.5"/>

  <!-- Bottom cosmic glow bar -->
  <rect x="0" y="375" width="384" height="9" fill="#3a4aaa" opacity="0.15"/>

</svg>
